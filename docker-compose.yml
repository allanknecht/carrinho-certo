services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile.dev
    command: bin/rails server -b 0.0.0.0
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_development
      # LLM (Ollama no Windows/Mac): o container acessa o host via host.docker.internal — não use localhost aqui.
      PRODUCT_NORMALIZATION_LLM_ENABLED: ${PRODUCT_NORMALIZATION_LLM_ENABLED:-false}
      OLLAMA_OPENAI_BASE_URL: ${OLLAMA_OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_READ_TIMEOUT: ${OLLAMA_READ_TIMEOUT:-120}
    ports:
      - "3000:3000"
    volumes:
      - ./backend/api:/rails
      - api_bundle:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  api_bundle:
